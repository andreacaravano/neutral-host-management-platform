###############################################################
# MAKE SURE YOU CHANGE group_vars/all.yaml VARIABLES!!!!!!!!!!!
###############################################################
- name: Apply system tuning for RAN workloads
  hosts: servers
  gather_facts: true
  roles:
    - tune-system

- name: Switch to the real-time kernel (PREEMPT_RT)
  hosts: servers
  gather_facts: true
  roles:
    - switch-rt-kernel

# bootstraps first server and copies configs for others/agents
- name: Prepare all nodes
  hosts: rke2
  gather_facts: false # fact gathering is slow and not needed for any of our tasks
  become: true
  roles:
    - prepare-nodes
    - rke2-download

- name: Prepare the network interfaces and modules for Kubernetes deployment
  hosts: servers
  gather_facts: true
  roles:
    - prepare-environment

# Creates RKE2 bootstrap manifests folder and copies kube-vip template over (configured with variables)
- name: Deploy Kube VIP
  hosts: servers
  gather_facts: true
  roles:
    - kube-vip

# bootstraps the first server, copies configs to nodes, saves token to use later
- name: Prepare RKE2 on Servers and Agents
  hosts: servers,agents
  gather_facts: true
  roles:
    - rke2-prepare

# Adds additional servers using the token from the previous task
- name: Add additional RKE2 Servers and complete configuration
  hosts: servers
  gather_facts: true
  roles:
    - add-server

# Our use-case requires only a single node deployment, but, as typically observed in Kubernetes clusters, it can be expanded to more servers (control planes) and agents (workers)
# acting on the inventory hosts and recovering the original add-agent roles and variables (see commit history)

# Finish kube-vip, add metallb
- name: Apply manifests after cluster is created
  hosts: servers
  gather_facts: true
  roles:
    - apply-manifests

- name: Finalize the deployment by updating the system and preparing dependencies for profiling
  hosts: servers
  gather_facts: true
  roles:
    - finalize
