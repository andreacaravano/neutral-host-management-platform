# Wait for Server 1 to be ready before continuing with the manifests
- name: Wait for k8s nodes with node label 'server=true' to be ready
  ansible.builtin.command:
    cmd: "kubectl wait --for=condition=Ready nodes --selector server=true --timeout=600s"
  register: nodes_ready
  retries: 120
  delay: 10
  changed_when: true
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]

- name: Wait for Nginx Ingress DaemonSet to be created
  ansible.builtin.command: 
    cmd: "kubectl -n kube-system get ds rke2-ingress-nginx-controller"
  register: ds_exist_check
  until: ds_exist_check.rc == 0
  retries: 120 # retry for (120 * 5 = 10) minutes
  delay: 5
  ignore_errors: true
  changed_when: false
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]

# Stop the playbook if still not created
- name: Fail if Nginx Ingress was never created
  ansible.builtin.fail:
    msg: "Timeout: RKE2 did not create the Nginx Ingress DaemonSet within 10 minutes. Check RKE2 logs."
  become_user: "{{ ansible_user }}"
  when: 
    - inventory_hostname == groups['servers'][0]
    - ds_exist_check.rc != 0

# Now, wait for it to be ready
- name: Wait for Nginx Ingress Controller to be ready
  ansible.builtin.command:
    cmd: "kubectl -n kube-system rollout status ds/rke2-ingress-nginx-controller --timeout=600s"
  changed_when: false
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]

# Allow workloads on control plane nodes (actually already allowed by default on RKE2)
- name: Remove Taint from Control Plane nodes to allow workloads
  ansible.builtin.command:
    cmd: "kubectl taint nodes --all node-role.kubernetes.io/control-plane-"
  ignore_errors: true # Ignores the error thrown when taints have already been removed
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]

