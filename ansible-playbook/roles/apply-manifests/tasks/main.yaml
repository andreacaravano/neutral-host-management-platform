# Install Rancher (web GUI) on my custom domain (serviced through a web proxy, whose configuration is omitted here)
# The same effect can be reached by altering /etc/hosts and pointing the DNS resolution to the right IP
- name: Add Rancher Helm repository
  kubernetes.core.helm_repository:
    name: rancher-stable
    repo_url: https://releases.rancher.com/server-charts/stable
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]

- name: Add Jetstack Helm repository
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]

- name: Install cert-manager (waits for availability)
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    release_namespace: cert-manager
    create_namespace: true
    update_repo_cache: true
    wait: true
    values:
      installCRDs: true
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]

- name: Install Rancher (waits for deployment rollout)
  kubernetes.core.helm:
    name: rancher
    chart_ref: rancher-stable/rancher
    release_namespace: cattle-system
    create_namespace: true
    wait: true
    values:
      # This domain is served through a web proxy
      # The same effect can be observed by introducing an entry in /etc/hosts providing a static DNS resolution
      hostname: rancher.caravano.duckdns.org
      bootstrapPassword: admin
      replicas: 1 # single-node setup (alter accordingly, view notes)
      ingress:
        tls:
          source: rancher # Forces the creation of an ingress certificate managed by cert-manager
  become_user: "{{ ansible_user }}"
  when: inventory_hostname == groups['servers'][0]
